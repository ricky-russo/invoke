# Invoke Pipeline Configuration
# This file defines providers, roles, strategies, and settings for your invoke pipeline.
# Customize roles and strategies by editing the referenced .md files.

providers:
  claude:
    cli: claude
    args: ["--print", "--model", "{{model}}", "--dangerously-skip-permissions"]
  codex:
    cli: codex
    args: ["exec", "--model", "{{model}}", "--full-auto", "-c", "reasoning_effort={{effort}}"]

roles:
  researcher:
    codebase:
      prompt: .invoke/roles/researcher/codebase.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: high
          timeout: 600
        - provider: codex
          model: o3
          effort: high
          timeout: 600
    best-practices:
      prompt: .invoke/roles/researcher/best-practices.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: medium
          timeout: 600
        - provider: codex
          model: o3
          effort: medium
          timeout: 600
    dependencies:
      prompt: .invoke/roles/researcher/dependencies.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: medium
          timeout: 600
        - provider: codex
          model: o3
          effort: medium
          timeout: 600

  planner:
    architect:
      prompt: .invoke/roles/planner/architect.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: high
          timeout: 600
        - provider: codex
          model: o3
          effort: high
          timeout: 600
    alternative:
      prompt: .invoke/roles/planner/alternative.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: high
          timeout: 600
        - provider: codex
          model: o3
          effort: high
          timeout: 600

  builder:
    default:
      prompt: .invoke/roles/builder/default.md
      providers:
        - provider: claude
          model: claude-sonnet-4-6
          effort: high
          timeout: 300
        - provider: codex
          model: o3
          effort: high
          timeout: 300

  reviewer:
    spec-compliance:
      prompt: .invoke/roles/reviewer/spec-compliance.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: high
          timeout: 300
        - provider: codex
          model: o3
          effort: high
          timeout: 300
    security:
      prompt: .invoke/roles/reviewer/security.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: high
          timeout: 300
        - provider: codex
          model: o3
          effort: high
          timeout: 300
    code-quality:
      prompt: .invoke/roles/reviewer/code-quality.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: medium
          timeout: 300
        - provider: codex
          model: o3
          effort: medium
          timeout: 300
    performance:
      prompt: .invoke/roles/reviewer/performance.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: high
          timeout: 300
        - provider: codex
          model: o3
          effort: high
          timeout: 300
    ux:
      prompt: .invoke/roles/reviewer/ux.md
      providers:
        - provider: claude
          model: claude-opus-4-6
          effort: medium
          timeout: 300
        - provider: codex
          model: o3
          effort: medium
