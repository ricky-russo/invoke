# Invoke Pipeline Configuration
# This file defines providers, roles, strategies, and settings for your invoke pipeline.
# Customize roles and strategies by editing the referenced .md files.
#
# Cost guide:
#   Opus is ~5x more expensive than Sonnet per token.
#   Use Opus for tasks requiring strong reasoning (planning, spec-compliance review).
#   Use Sonnet for mechanical tasks (research, building, pattern-matching reviews).
#   Single-provider is cheaper than dual-provider — reserve dual for critical reviews.

providers:
    claude:
        cli: claude
        args: ["--print", "--model", "{{model}}", "--effort", "{{effort}}", "--dangerously-skip-permissions"]
    codex:
        cli: codex
        # SECURITY: danger-full-access disables codex sandbox (network + filesystem).
        # Invoke isolates builders in temporary worktrees that are squash-merged and cleaned up,
        # so the codex sandbox adds no containment value beyond what invoke already provides.
        args: ["--ask-for-approval", "never", "exec", "--model", "{{model}}", "--sandbox", "danger-full-access", "-c", "reasoning_effort={{effort}}"]
    gemini:
        cli: gemini
        args: ["-y", "--output-format", "text", "-m", "{{model}}", "-p"]

